spring:
  application:
    name: collector-example-002
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/collector}
    username: ${DB_USERNAME:collector}
    password: ${DB_PASSWORD:collector}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    validate-migration-naming: true
    clean-disabled: true
  data:
    redis:
      host: localhost
      port: 6379
      client-type: jedis
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000ms
  kafka:
    bootstrap-servers: localhost:9092, localhost:9093, localhost:9094

collector:
  polling_cycle: 10
  connection_timeout: 5
  response_timeout: 5
